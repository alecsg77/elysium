---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: copilot-api-data
  namespace: ai
  labels:
    app.kubernetes.io/name: copilot-api
    app.kubernetes.io/instance: copilot-api
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copilot-api
  namespace: ai
  labels:
    app.kubernetes.io/name: copilot-api
    app.kubernetes.io/instance: copilot-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: copilot-api
      app.kubernetes.io/instance: copilot-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: copilot-api
        app.kubernetes.io/instance: copilot-api
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: copilot-api
          image: ghcr.io/ericc-ch/copilot-api:v0.7
          args:
            - start
            - --account-type
            - individual
            - --rate-limit
            - "10"
            - --wait
          ports:
            - name: http
              containerPort: 4141
              protocol: TCP
          env:
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: copilot-api-secret
                  key: GH_TOKEN
          volumeMounts:
            - name: data
              mountPath: /root/.local/share/copilot-api
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /v1/models
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/models
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: copilot-api-data
---
apiVersion: v1
kind: Service
metadata:
  name: copilot-api
  namespace: ai
  labels:
    app.kubernetes.io/name: copilot-api
    app.kubernetes.io/instance: copilot-api
spec:
  selector:
    app.kubernetes.io/name: copilot-api
    app.kubernetes.io/instance: copilot-api
  ports:
    - name: http
      port: 4141
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: copilot-api
  namespace: ai
  labels:
    app.kubernetes.io/name: copilot-api
    app.kubernetes.io/instance: copilot-api
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: copilot-api
      port:
        number: 4141
  tls:
    - hosts:
        - copilot-api
