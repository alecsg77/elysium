---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mux-data
  labels:
    app.kubernetes.io/name: mux
    app.kubernetes.io/instance: mux
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mux
  labels:
    app.kubernetes.io/name: mux
    app.kubernetes.io/instance: mux
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mux
      app.kubernetes.io/instance: mux
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mux
        app.kubernetes.io/instance: mux
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: install-tools
          image: debian:bookworm-slim
          command:
            - sh
            - -c
            - |
              set -e
              TOOLS_DIR=/tools/bin
              mkdir -p "$TOOLS_DIR"

              # Skip if already installed (cache across restarts)
              if [ -f "$TOOLS_DIR/.installed" ]; then
                echo "Tools already installed, skipping."
                exit 0
              fi

              apt-get update -qq
              apt-get install -y --no-install-recommends curl ca-certificates gnupg npm nodejs 2>/dev/null

              # Docker CLI (client only) via official apt repo
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable" \
                > /etc/apt/sources.list.d/docker.list
              apt-get update -qq
              apt-get install -y --no-install-recommends docker-ce-cli 2>/dev/null
              cp $$(which docker) "$TOOLS_DIR/docker"

              # Coder CLI
              curl -fsSL "https://coder.com/install.sh" | sh -s -- --method=standalone --prefix=/tools 2>/dev/null

              # Dev Container CLI
              npm install -g --prefix /tools @devcontainers/cli 2>/dev/null
              # Ensure devcontainer binary is executable in PATH
              chmod +x /tools/bin/devcontainer 2>/dev/null || true

              touch "$TOOLS_DIR/.installed"
              echo "All tools installed."
          volumeMounts:
            - name: tools
              mountPath: /tools
      containers:
        - name: mux
          image: ghcr.io/coder/mux:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
            - name: MUX_SERVER_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mux-secrets
                  key: MUX_SERVER_AUTH_TOKEN
            - name: CODER_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mux-secrets
                  key: CODER_SESSION_TOKEN
            - name: CODER_URL
              valueFrom:
                secretKeyRef:
                  name: mux-secrets
                  key: CODER_URL
            - name: PATH
              value: "/tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          volumeMounts:
            - name: mux-data
              mountPath: /root/.mux
            - name: tools
              mountPath: /tools
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
        - name: dind
          image: docker:dind
          args:
            - --host=tcp://0.0.0.0:2375
            - --tls=false
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-storage
              mountPath: /var/lib/docker
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: mux-data
          persistentVolumeClaim:
            claimName: mux-data
        - name: docker-storage
          emptyDir: {}
        - name: tools
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mux
  labels:
    app.kubernetes.io/name: mux
    app.kubernetes.io/instance: mux
spec:
  selector:
    app.kubernetes.io/name: mux
    app.kubernetes.io/instance: mux
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mux
  labels:
    app.kubernetes.io/name: mux
    app.kubernetes.io/instance: mux
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: mux
      port:
        number: 3000
  tls:
    - hosts:
        - mux
