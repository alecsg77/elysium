---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mux-data
  labels:
    app.kubernetes.io/name: mux
    app.kubernetes.io/instance: mux
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mux
  labels:
    app.kubernetes.io/name: mux
    app.kubernetes.io/instance: mux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mux
      app.kubernetes.io/instance: mux
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mux
        app.kubernetes.io/instance: mux
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: mux
          image: ghcr.io/coder/mux:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
          volumeMounts:
            - name: mux-data
              mountPath: /root/.mux
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
        - name: dind
          image: docker:dind
          args:
            - --host=tcp://0.0.0.0:2375
            - --tls=false
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-storage
              mountPath: /var/lib/docker
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: mux-data
          persistentVolumeClaim:
            claimName: mux-data
        - name: docker-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mux
  labels:
    app.kubernetes.io/name: mux
    app.kubernetes.io/instance: mux
spec:
  selector:
    app.kubernetes.io/name: mux
    app.kubernetes.io/instance: mux
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mux
  labels:
    app.kubernetes.io/name: mux
    app.kubernetes.io/instance: mux
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: mux
      port:
        number: 3000
  tls:
    - hosts:
        - mux
