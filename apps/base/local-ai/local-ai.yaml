---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: go-skynet
spec:
  type: default
  interval: 24h
  url: https://go-skynet.github.io/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-ai
spec:
  releaseName: local-ai
  chart:
    spec:
      chart: local-ai
      sourceRef:
        kind: HelmRepository
        name: go-skynet
  interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: local-ai-helm-values
      optional: true
  values:
    deployment:
      env:
        DEBUG: true
    persistence:
      models:
        accessModes:
          - ReadWriteOnce
      output:
        accessModes:
          - ReadWriteOnce