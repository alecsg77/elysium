---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: raiplaysoundrss
spec:
  image: ghcr.io/alecsg77/raiplaysoundrss
  interval: 1m0s
  secretRef:
    name: ghcr-alecsg77-regcred
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: raiplaysoundrss-policy
spec:
  imageRepositoryRef:
    name: raiplaysoundrss
  policy:
    semver:
      range: "*"
  digestReflectionPolicy: Always
  interval: 1m0s
