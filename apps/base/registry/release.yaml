apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: registry
spec:
  releaseName: registry
  chart:
    spec:
      chart: ./charts/onechart
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  interval: 12h
  values:
    image:
      repository: registry # {"$imagepolicy": "registry:registry-policy:name"}
      tag: "2.8.3" # {"$imagepolicy": "registry:registry-policy:tag"}
    volumes:
      - name: registry
        size: "100Mi"
        path: /var/lib/registry
    containerPort: 5000
