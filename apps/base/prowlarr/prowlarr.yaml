apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prowlarr
spec:
  releaseName: prowlarr
  chart:
    spec:
      chart: ./charts/onechart
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: prowlarr-helm-values
      optional: true
  values:
    image:
      repository: lscr.io/linuxserver/prowlarr # {"$imagepolicy": "arkham:prowlarr-policy:name"}
      tag: "1.37.0" # {"$imagepolicy": "arkham:prowlarr-policy:tag"}
    vars:
      PUID: ${PUID:=1000}
      PGID: ${PGID:=1000}
      TZ: ${TZ:=Etc/UTC}
    podSecurityContext:
      fsGroup: ${PGID:=1000}
    volumes:
      - name: storage
        size: "100Mi"
        path: /config
        subPath: prowlarr/config
        existingClaim: pvc-storage
      - name: backups
        size: "500Mi"
        path: /backups
        subPath: prowlarr/backups
        existingClaim: pvc-backups
    containerPort: 9696
    ingress:
      path: /prowlarr
    probe:
      enabled: true
      path: /prowlarr/ping
      settings:
        initialDelaySeconds: 30
        timeoutSeconds: 5
    livenessProbe:
      enabled: true
      path: /prowlarr/ping
      settings:
        initialDelaySeconds: 30
        timeoutSeconds: 10
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: prowlarr
spec:
  image: lscr.io/linuxserver/prowlarr
  interval: 24h
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: prowlarr-policy
spec:
  imageRepositoryRef:
    name: prowlarr
  policy:
    semver:
      range: 1.x
  digestReflectionPolicy: Always
  interval: 24h
