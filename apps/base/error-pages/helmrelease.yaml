apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: error-pages
spec:
  releaseName: error-pages
  chart:
    spec:
      chart: ./charts/onechart
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  interval: 12h
  values:
    image:
      repository: ghcr.io/tarampampam/error-pages # {"$imagepolicy": "default:error-pages-policy:name"}
      tag: "3.8.1" # {"$imagepolicy": "default:error-pages-policy:tag"}
    vars:
      TEMPLATES_ROTATION_MODE: "random-on-each-request"
    containerPort: 8080
