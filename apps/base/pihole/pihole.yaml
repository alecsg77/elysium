apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole
spec:
  releaseName: pihole
  chart:
    spec:
      chart: ./charts/onechart
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: pihole-helm-values
      optional: true
  values:
    image:
      repository: pihole/pihole # {"$imagepolicy": "arkham:pihole-policy:name"}
      tag: "2025.11.1" # {"$imagepolicy": "arkham:pihole-policy:tag"}
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "1"
        memory: "1Gi"
    vars:
      TZ: ${TZ:=Etc/UTC}
      FTLCONF_webserver_api_password: ''
      FTLCONF_webserver_port: '80'
      FTLCONF_webserver_domain: '${ts_net}'
      FTLCONF_webserver_paths_prefix: '/pihole'
      FTLCONF_dns_listeningMode: 'ALL'
      FTLCONF_dns_domain_name: 'cluster.local'
    podSecurityContext:
      fsGroup: ${PGID:=1000}
    volumes:
      - name: storage
        size: "100Mi"
        path: /etc/pihole
        subPath: pihole/config
        existingClaim: pvc-storage
    containerPort: 80
    container:
      ports:
        - name: http
          containerPort: 80
          protocol: TCP
        - name: dns-tcp
          containerPort: 53
          protocol: TCP
        - name: dns-udp
          containerPort: 53
          protocol: UDP
    ingress:
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
        traefik.ingress.kubernetes.io/router.middlewares: arkham-strip-prefix@kubernetescrd
      host: arkham.${ts_net}
      path: /pihole
    ports:
      - name: http
        containerPort: 80
        protocol: TCP
      - name: dns-tcp
        containerPort: 53
        protocol: TCP
      - name: dns-udp
        containerPort: 53
        protocol: UDP
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: pihole
spec:
  image: pihole/pihole
  interval: 24h
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: pihole-policy
spec:
  imageRepositoryRef:
    name: pihole
  filterTags:
    pattern: '^(?P<major>0|[1-9]\d*)\.(?P<minor>0|[1-9]\d*)\.(?P<patch>0|[1-9]\d*)$'
    extract: "$major.$minor.$patch"
  policy:
    semver:
      range: "*"
  digestReflectionPolicy: Always
  interval: 24h
