apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flaresolverr
spec:
  releaseName: flaresolverr
  chart:
    spec:
      chart: ./charts/onechart
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: flaresolverr-helm-values
      valuesKey: flaresolverr-values.yaml
      optional: true
  values:
    image:
      repository: ghcr.io/flaresolverr/flaresolverr # {"$imagepolicy": "arkham:flaresolverr-policy:name"}
      tag: "v3.5.0" # {"$imagepolicy": "arkham:flaresolverr-policy:tag"}
    vars:
      TZ: ${TZ:=Etc/UTC}
      LOG_LEVEL: debug
      LANG: en_US
    containerPort: 8191
    probe:
      enabled: true
      path: /health
      settings:
        initialDelaySeconds: 10
        timeoutSeconds: 5
    livenessProbe:
      enabled: true
      path: /health
      settings:
        initialDelaySeconds: 15
        timeoutSeconds: 10
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: flaresolverr
spec:
  image: ghcr.io/flaresolverr/flaresolverr
  interval: 24h
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: flaresolverr-policy
spec:
  imageRepositoryRef:
    name: flaresolverr
  filterTags:
    pattern: '^v(?P<major>0|[1-9]\d*)\.(?P<minor>0|[1-9]\d*)\.(?P<patch>0|[1-9]\d*)$'
    extract: "$major.$minor.$patch"
  policy:
    semver:
      range: 3.x
  digestReflectionPolicy: Always
  interval: 24h
