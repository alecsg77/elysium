---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: open-webui
spec:
  type: default
  interval: 24h
  url: https://helm.openwebui.com
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openwebui
spec:
  releaseName: openwebui
  chart:
    spec:
      chart: open-webui
      sourceRef:
        kind: HelmRepository
        name: open-webui
  interval: 12h
  # Open WebUI upgrades can exceed Flux's default 5m wait while the StatefulSet
  # reinitializes cached data and comes back Ready.
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  valuesFrom:
    - kind: ConfigMap
      name: openwebui-helm-values
      optional: true
  values:
    ollama:
      enabled: false
    ollamaUrls:
      - http://ollama.ai.svc:11434
    ingress:
      enabled: true
    tika:
      enabled: true
    sso:
      enabled: true
      enableSignup: true
      mergeAccountsByEmail: true
      github:
        enabled: true
      trustedHeader:
        enabled: true
        emailHeader: Tailscale-User-Login
        nameHeader: Tailscale-User-Name
    extraEnvVars:
      - name: EXTRA_PIP_PACKAGES
        value: datasets==3.6.0