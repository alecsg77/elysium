apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
spec:
  releaseName: qbittorrent
  chart:
    spec:
      chart: ./charts/onechart
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: qbittorrent-helm-values
      optional: true
  values:
    image:
      repository: lscr.io/linuxserver/qbittorrent # {"$imagepolicy": "arkham:qbittorrent-policy:name"}
      tag: "5.2.3" # {"$imagepolicy": "arkham:qbittorrent-policy:tag"}
    vars:
      PUID: ${PUID:=1000}
      PGID: ${PGID:=1000}
      TZ: ${TZ:=Etc/UTC}
      TORRENTING_PORT: 51413
    podSecurityContext:
      fsGroup: ${PGID:=1000}
    volumes:
      - name: config
        size: "100Mi"
        path: /config
        subPath: qbittorrent/config
        existingClaim: pvc-storage
      - name: downloads
        size: "100Mi"
        path: /downloads
        existingClaim: pvc-downloads
      - name: watch
        size: "100Mi"
        path: /watch
        existingClaim: pvc-watch
    containerPort: 8080
    ingress:
      path: /qbittorrent
    container:
      ports:
        - name: http
          containerPort: 8080
        - name: tcp
          protocol: TCP
          containerPort: 51413
          hostPort: 51413
        - name: udp
          protocol: UDP
          containerPort: 51413
          hostPort: 51413
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: qbittorrent
spec:
  image: lscr.io/linuxserver/qbittorrent
  interval: 24h
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: qbittorrent-policy
spec:
  imageRepositoryRef:
    name: qbittorrent
  policy:
    semver:
      range: 5.x
  digestReflectionPolicy: Always
  interval: 24h
