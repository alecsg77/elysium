apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unmonitorr
spec:
  releaseName: unmonitorr
  chart:
    spec:
      chart: ./charts/onechart
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: unmonitorr-helm-values
      optional: true
  values:
    image:
      repository: shraymonks/unmonitorr # {"$imagepolicy": "arkham:unmonitorr-policy:name"}
      tag: "v1.2.0" # {"$imagepolicy": "arkham:unmonitorr-policy:tag"}
    vars:
      PLEX_PORT: 9797
    existingSecrets:
      - name: unmonitorr
        optional: true
    containerPort: 9797
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: unmonitorr
spec:
  image: shraymonks/unmonitorr
  interval: 24h
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: unmonitorr-policy
spec:
  imageRepositoryRef:
    name: unmonitorr
  policy:
    semver:
      range: 1.x
  digestReflectionPolicy: Always
  interval: 24h
