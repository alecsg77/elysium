apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
spec:
  releaseName: sonarr
  chart:
    spec:
      chart: ./charts/onechart
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: sonarr-helm-values
      valuesKey: sonarr-values.yaml
      optional: true
  values:
    image:
      repository: lscr.io/linuxserver/sonarr # {"$imagepolicy": "arkham:sonarr-policy:name"}
      tag: "4.0.19" # {"$imagepolicy": "arkham:sonarr-policy:tag"}
    vars:
      PUID: ${PUID:=1000}
      PGID: ${PGID:=1000}
      TZ: ${TZ:=Etc/UTC}
    podSecurityContext:
      fsGroup: ${PGID:=1000}
    volumes:
      - name: storage
        size: "100Mi"
        path: /config
        subPath: sonarr/config
        existingClaim: pvc-storage
      - name: downloads
        size: "100Mi"
        path: /downloads
        existingClaim: pvc-downloads
      - name: library
        size: "100Mi"
        path: /media/library
        existingClaim: pvc-library
      - name: backups
        size: "500Mi"
        path: /backups
        subPath: sonarr/backups
        existingClaim: pvc-backups
    containerPort: 8989
    ingress:
      path: /sonarr
    probe:
      enabled: true
      path: /sonarr/ping
      settings:
        initialDelaySeconds: 30
        timeoutSeconds: 5
    livenessProbe:
      enabled: true
      path: /sonarr/ping
      settings:
        initialDelaySeconds: 30
        timeoutSeconds: 10
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: sonarr
spec:
  image: lscr.io/linuxserver/sonarr
  interval: 24h
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: sonarr-policy
spec:
  imageRepositoryRef:
    name: sonarr
  policy:
    semver:
      range: 4.x
  digestReflectionPolicy: Always
  interval: 24h
