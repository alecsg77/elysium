apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: configarr
spec:
  releaseName: configarr
  chart:
    spec:
      chart: ./charts/cron-job
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: configarr-helm-values
      valuesKey: configarr-values.yaml
      optional: true
  values:
    image:
      repository: ghcr.io/raydak-labs/configarr # {"$imagepolicy": "arkham:configarr-policy:name"}
      tag: "1.29.1" # {"$imagepolicy": "arkham:configarr-policy:tag"}
    schedule: "0 0 * * *" # Runs every 24 hours (daily at midnight)
    overrideCommand: false
    vars:
      PUID: ${PUID:=1000}
      PGID: ${PGID:=1000}
      TZ: ${TZ:=Etc/UTC}
      ROOT_PATH: /config
    podSecurityContext:
      runAsUser: ${PUID:=1000}
      runAsGroup: ${PGID:=1000}
      fsGroup: ${PGID:=1000}
    volumes:
      - name: storage
        size: "100Mi"
        path: /config
        subPath: configarr/config
        existingClaim: pvc-storage
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: configarr
spec:
  image: ghcr.io/raydak-labs/configarr
  interval: 24h
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: configarr-policy
spec:
  imageRepositoryRef:
    name: configarr
  policy:
    semver:
      range: 1.x
  digestReflectionPolicy: Always
  interval: 24h
