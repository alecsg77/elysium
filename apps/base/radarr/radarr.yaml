apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
spec:
  releaseName: radarr
  chart:
    spec:
      chart: ./charts/onechart
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: radarr-helm-values
      optional: true
  values:
    image:
      repository: lscr.io/linuxserver/radarr # {"$imagepolicy": "arkham:radarr-policy:name"}
      tag: "5.28.0" # {"$imagepolicy": "arkham:radarr-policy:tag"}
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
    vars:
      PUID: ${PUID:=1000}
      PGID: ${PGID:=1000}
      TZ: ${TZ:=Etc/UTC}
    podSecurityContext:
      fsGroup: ${PGID:=1000}
    volumes:
      - name: storage
        size: "100Mi"
        path: /config
        subPath: radarr/config
        existingClaim: pvc-storage
      - name: downloads
        size: "100Mi"
        path: /downloads
        existingClaim: pvc-downloads
      - name: library
        size: "100Mi"
        path: /media/library
        existingClaim: pvc-library
      - name: backups
        size: "500Mi"
        path: /backups
        subPath: radarr/backups
        existingClaim: pvc-backups
    containerPort: 7878
    ingress:
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
      host: arkham.${ts_net}
      path: /radarr
    probe:
      enabled: true
      path: /radarr/ping
      settings:
        initialDelaySeconds: 30
        timeoutSeconds: 5
    livenessProbe:
      enabled: true
      path: /radarr/ping
      settings:
        initialDelaySeconds: 30
        timeoutSeconds: 10
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: radarr
spec:
  image: lscr.io/linuxserver/radarr
  interval: 24h
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: radarr-policy
spec:
  imageRepositoryRef:
    name: radarr
  policy:
    semver:
      range: 5.x
  digestReflectionPolicy: Always
  interval: 24h
