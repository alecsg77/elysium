---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openclaw
  namespace: ai
spec:
  interval: 24h
  retryInterval: 5m
  timeout: 10m
  targetNamespace: ai
  sourceRef:
    kind: GitRepository
    name: openclaw
  path: ./scripts/k8s/manifests
  prune: true
  wait: true
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: openclaw
      namespace: ai
  patches:
    - patch: |-
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: openclaw-config
        data:
          openclaw.json: |
            {
              "gateway": {
                "mode": "local",
                "bind": "lan",
                "port": 18789,
                "auth": {
                  "mode": "token"
                },
                "controlUi": {
                  "enabled": true
                }
              },
              "agents": {
                "defaults": {
                  "workspace": "~/.openclaw/workspace"
                },
                "list": [
                  {
                    "id": "default",
                    "name": "OpenClaw Assistant",
                    "workspace": "~/.openclaw/workspace"
                  }
                ]
              },
              "cron": { "enabled": false }
            }
          AGENTS.md: |
            # OpenClaw Assistant

            You are a helpful AI assistant running in Kubernetes.
      target:
        kind: ConfigMap
        name: openclaw-config
    - patch: |-
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: openclaw
        spec:
          template:
            spec:
              initContainers:
                - name: init-config
                  securityContext:
                    runAsUser: 0
                    runAsGroup: 0
                  command:
                    - sh
                    - -c
                    - |
                      mkdir -p /home/node/.openclaw/workspace
                      mkdir -p /home/node/.openclaw/.npm
                      chown 1000:1000 /home/node/.openclaw /home/node/.openclaw/workspace
                      chown 1000:1000 /home/node/.openclaw/.npm
                      if [ ! -f /home/node/.openclaw/openclaw.json ]; then
                        cp /config/openclaw.json /home/node/.openclaw/openclaw.json
                      fi
                      if [ ! -f /home/node/.openclaw/workspace/AGENTS.md ]; then
                        cp /config/AGENTS.md /home/node/.openclaw/workspace/AGENTS.md
                      fi
              containers:
                - name: gateway
                  env:
                    - name: NPM_CONFIG_CACHE
                      value: /home/node/.openclaw/.npm
                    - name: npm_config_cache
                      value: /home/node/.openclaw/.npm
                    # Keep the Copilot credential optional so the gateway can
                    # start before the real SealedSecret is provisioned.
                    - name: COPILOT_GITHUB_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: openclaw-copilot-auth
                          key: COPILOT_GITHUB_TOKEN
                          optional: true
                    - name: GH_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: openclaw-copilot-auth
                          key: GH_TOKEN
                          optional: true
      target:
        kind: Deployment
        name: openclaw
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw
  namespace: ai
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/instance: openclaw
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: openclaw
      port:
        number: 18789
  tls:
    - hosts:
        - openclaw
