apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: arkham

resources:
  - namespace.yaml
  - pvc.yaml
  - ../../base/apprise-api
  - ../../base/bazarr
  - ../../base/configarr
  - ../../base/flaresolverr
  - ../../base/jellyfin
  - ../../base/lidarr
  - ../../base/msmtpd
  - ../../base/overseerr
  - ../../base/pihole
  - ../../base/plex
  - ../../base/prowlarr
  - ../../base/qbittorrent
  - ../../base/radarr
  - ../../base/sonarr
  - ../../base/tautulli
  - ../../base/unmonitorr
  - arkham-unmonitorr-sealed-secret.yaml

patches:
  - path: arkham-resources.yaml
  - path: arkham-pihole-patch.yaml
    target:
      kind: HelmRelease
      name: pihole
