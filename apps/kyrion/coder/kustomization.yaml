apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - ../../base/coder
  - sealed-secrets.yaml

patches:
  - path: coder-values.yaml
    target:
      kind: HelmRelease
      name: coder
  - patch: |-
      - op: add
        path: "/spec/values/coder/env/-"
        value:
          name: CODER_ACCESS_URL
          value: "https://coder.${ts_net}"
    target:
      kind: HelmRelease
      name: coder
  - path: coder-logstream-kube-values.yaml
    target:
      kind: HelmRelease
      name: coder-logstream-kube
