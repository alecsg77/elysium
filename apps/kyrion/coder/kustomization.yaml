apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: coder

resources:
  - namespace.yaml
  - ../../base/coder
  - sealed-secrets.yaml

patches:
  # JSON Patch to append CODER_ACCESS_URL to the env array defined in base.
  # Array append cannot be expressed as a Helm values override, so we keep this patch.
  - patch: |-
      - op: add
        path: "/spec/values/coder/env/-"
        value:
          name: CODER_ACCESS_URL
          value: "https://coder.${ts_net}"
    target:
      kind: HelmRelease
      name: coder

configMapGenerator:
  - name: coder-db-helm-values
    literals: []
    options:
      disableNameSuffixHash: true
  - name: coder-helm-values
    files:
      - values.yaml=coder-overlay-values.yaml
    options:
      disableNameSuffixHash: true
  - name: coder-logstream-kube-helm-values
    files:
      - values.yaml=coder-logstream-kube-overlay-values.yaml
    options:
      disableNameSuffixHash: true
