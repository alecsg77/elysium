apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base
  - ./coder
  - ./registry
  - ./raiplaysoundrss
  - ../base/arkham
  - ./fission
  - ./ai
  - arc-runner-set.yaml
  - web-public.yaml
  - fission-runner-set.yaml
  - coder-runner-set.yaml
  - copilot-runner-set.yaml
  - raiplaysoundrss-runner-set.yaml
  - arkham-unmonitorr-sealed-secret.yaml

patches:
  - path: arkham-resources.yaml
  - path: arkham-pihole-patch.yaml
    target:
      kind: HelmRelease
      name: pihole
      namespace: arkham
