apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: raiplaysoundrss

resources:
  - namespace.yaml
  - ../../base/raiplaysoundrss
  - sealed-secrets.yaml

configMapGenerator:
  - name: raiplaysoundrss-helm-values
    files:
      - values.yaml=raiplaysoundrss-values.yaml
    options:
      disableNameSuffixHash: true
