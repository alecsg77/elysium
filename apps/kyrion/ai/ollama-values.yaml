ollama:
  models:
    pull:
      - gemma3:12b
    run:
      - gemma3:12b
ingress:
  enabled: true
  className: tailscale
  hosts:
    - host: ollama
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - ollama
persistentVolume:
  enabled: true
extraEnv:
  - name: OLLAMA_INTEL_GPU
    value: "1"
resources:
  requests:
    gpu.intel.com/i915: "1"
  limits:
    gpu.intel.com/i915: "1"
