apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: kube-system
spec:
  releaseName: headlamp
  chart:
    spec:
      chart: headlamp
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: kube-system
  interval: 12h
  values:
    config:
      inCluster: true
      inClusterContextName: kyrion
    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: "@headlamp-k8s/headlamp-plugin-flux"
            version: "latest"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
